    // Load pdf-lib via fetch
    var pdfLibLoaded = false;
    function loadPdfLib() {
        var url = "https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js";
        console.log("Frye Consult: Fetching pdf-lib from", url);
        fetch(url)
            .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
            .then(function (code) {
                var fn = new Function(code);
                fn();
                if (window.PDFLib) {
                    pdfLibLoaded = true;
                    console.log("Frye Consult: pdf-lib loaded successfully");
                } else {
                    console.error("Frye Consult: pdf-lib not on window after eval");
                }
            })
            .catch(function (err) {
                console.error("Frye Consult: pdf-lib FAILED:", err.message);
                // Try CDN fallback
                fetch("https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js")
                    .then(function (r) { return r.text(); })
                    .then(function (code) { var fn = new Function(code); fn(); if (window.PDFLib) { pdfLibLoaded = true; console.log("Frye Consult: pdf-lib loaded from jsdelivr"); } })
                    .catch(function (err2) { console.error("Frye Consult: ALL pdf-lib sources failed"); });
            });
    }
    loadPdfLib();

    // ── Start scanning when on the right route ──

    window.addEventListener("routeChangeEvent", function (eev) {
        console.log("Frye Consult: Route changed", eev?.detail?.to?.name);
        clearInterval(fryeConsultInterval);
        if (eev?.detail?.to?.params?.location_id == FRYE_LOCATION_ID) {
            startScanning();
        }
    });

    if (window.location.href.includes(FRYE_LOCATION_ID)) {
        console.log("Frye Consult: Already on Frye location, starting scan");
        startScanning();
    }

    function startScanning() {
        clearInterval(fryeConsultInterval);
        fryeConsultInterval = setInterval(function () {
            scanCards();
            scanModal();
        }, 500);
    }

    // ── Scan cards and add consultation icon ──

    function scanCards() {
        var cards = document.querySelectorAll(".ui-card .ui-card-content [data-contact-id]");
        if (cards.length === 0) return;
        cards.forEach(function (element) {
            var parenDiv = element.parentElement;
            if (!parenDiv) return;
            if (parenDiv.classList.contains("frye_consult_added")) return;
            parenDiv.classList.add("frye_consult_added");
            var cId = element.getAttribute("data-contact-id");
            var oId = element.getAttribute("id");

    async function fillTemplate(data) {

        var H = 792;

        var szSm = 8;

        // Helper: draw text at position (x from left, y from top of page)
        function txt(page, text, x, yFromTop, size, f) {
            if (!text) return;

        }

        // Helper: draw checkmark

        function matches(val, term) {

        // Consult Type checkboxes
        chk(p1, matches(data.consultType, "In Person"), 193, 148);
        chk(p1, matches(data.consultType, "Zoom"), 193, 168);
        chk(p1, matches(data.consultType, "Phone"), 193, 188);

        // Date, Time, Intaker, Scheduled by

        // Desired Outcome

        // Retainer section

        txt(p2, data.retainerPlusTrial, 380, 590);

        // Single Payment / Payment Plan checkboxes

        chk(p2, matches(data.paymentPlan, "Yes") || matches(data.paymentPlan, "Payment"), 67, 638);
        txt(p2, data.noRetainerReferTo, 410, 615);
        txt(p2, data.other, 255, 638);

        // Due at Signing, Installments, Due Date
        txt(p2, data.dueAtSigning, 140, 660);
        txt(p2, data.numInstallments, 320, 660);
        chk(p2, matches(data.dueDate, "10"), 430, 660);
        chk(p2, matches(data.dueDate, "20"), 490, 660);

        // Start Date, Cash Discount
        txt(p2, data.startDate, 120, 682);
        txt(p2, data.cashDiscount, 310, 682);
        txt(p2, data.cashDiscountPaidBy, 450, 682);

        // ═══════════════════════════════════════
        // PAGE 3
        // ═══════════════════════════════════════

        txt(p3, data.courtesyDiscount, 175, 115);
        txt(p3, data.courtesyNotes, 320, 115);

        // Save and preview

        var blob = new Blob([filledBytes], { type: "application/pdf" });
        showPreviewPopup(blob, data);
    }

    // Simple text wrapping
    function wrapText(text, font, size, maxWidth) {
        if (!text) return [];
        var words = text.split(" ");
        var lines = [];
        var current = "";
        for (var i = 0; i < words.length; i++) {
            var test = current ? current + " " + words[i] : words[i];
            var w = font.widthOfTextAtSize(test, size);
            if (w > maxWidth && current) {
                lines.push(current);
                current = words[i];
            } else {
                current = test;
            }
        }
        if (current) lines.push(current);
        return lines;
    }

    // ── Helpers ──

    function getOpportunityName() {
        var el = document.querySelector(".ui-modal-heading .title");
        if (!el) return "";
        var clone = el.cloneNode(true);
        var btns = clone.querySelectorAll("button");
        btns.forEach(function (b) { b.remove(); });
        return clone.textContent.trim();
    }

    function getFieldByLabel(label) {
        var allItems = document.querySelectorAll(".hr-form-item");
        for (var i = 0; i < allItems.length; i++) {
            var item = allItems[i];
            var labelEl = item.querySelector(".hr-form-item-label__text, .n-form-item-label__text");
            if (!labelEl) continue;
            if (labelEl.textContent.trim() !== label) continue;
            var dropdown = item.querySelector(".hr-base-selection-input__content, .n-base-selection-input__content");
            if (dropdown) { var val = dropdown.textContent.trim(); if (val && val.indexOf("Select") === -1 && val.indexOf("Choose") === -1) return val; }
            var input = item.querySelector("input[type='text'], input:not([type='radio']):not([type='checkbox'])");
            if (input && input.value) return input.value.trim();
            var textarea = item.querySelector("textarea");
            if (textarea && textarea.value) return textarea.value.trim();
            var checkedRadio = item.querySelector("input[type='radio']:checked");
            if (checkedRadio) return checkedRadio.value;
            var chkbox = item.querySelector("[role='checkbox']");
            if (chkbox) return chkbox.getAttribute("aria-checked") === "true" ? "Yes" : "No";
            var dateInput = item.querySelector(".n-input__input-el, .hr-input__input-el");
            if (dateInput && dateInput.value) return dateInput.value.trim();
            var allText = item.textContent.replace(label, "").trim();
            if (allText && allText.length < 200) return allText;
            return "";
        }
        return "";
    }

    function getRadioByLabel(label) {
        var allItems = document.querySelectorAll(".hr-form-item");
        for (var i = 0; i < allItems.length; i++) {
            var item = allItems[i];
            var labelEl = item.querySelector(".hr-form-item-label__text, .n-form-item-label__text");
            if (!labelEl || labelEl.textContent.trim() !== label) continue;
            var checked = item.querySelector("input[type='radio']:checked");
            return checked ? checked.value : "";
        }
        return "";
    }
