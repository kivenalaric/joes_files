<script>
(function () {

    var FRYE_LOCATION_ID = "oUKKuxKyYWHUoncYOKhr";
    var fryeConsultInterval;
    var FRYE_PDF_URL = "https://raw.githubusercontent.com/kivenalaric/joes_files/main/Frye%20Doc.pdf";

    console.log("FRYE CONSULTATION SCRIPT LOADED");

    // Load pdf-lib via fetch + eval
    var pdfLibLoaded = false;
    function loadPdfLib() {
        var urls = [
            "https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js",
            "https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js",
            "https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"
        ];
        function tryLoad(idx) {
            if (idx >= urls.length) { console.error("Frye Consult: ALL pdf-lib sources failed"); return; }
            console.log("Frye Consult: Fetching pdf-lib from", urls[idx]);
            fetch(urls[idx]).then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
            .then(function(code) { var fn = new Function(code); fn(); if (window.PDFLib) { pdfLibLoaded = true; console.log("Frye Consult: pdf-lib loaded!"); } else { throw new Error("not on window"); } })
            .catch(function(err) { console.error("Frye Consult: FAILED from", urls[idx], err.message); tryLoad(idx + 1); });
        }
        tryLoad(0);
    }
    loadPdfLib();

    // Cache the template PDF bytes so we only fetch once
    var cachedTemplateBytes = null;
    function fetchTemplate() {
        if (cachedTemplateBytes) return Promise.resolve(cachedTemplateBytes);
        console.log("Frye Consult: Fetching PDF template from GitHub...");
        return fetch(FRYE_PDF_URL).then(function(r) {
            if (!r.ok) throw new Error("Template fetch failed: " + r.status);
            return r.arrayBuffer();
        }).then(function(buf) {
            cachedTemplateBytes = new Uint8Array(buf);
            console.log("Frye Consult: PDF template loaded!", cachedTemplateBytes.length, "bytes");
            return cachedTemplateBytes;
        });
    }

    // Start scanning
    window.addEventListener("routeChangeEvent", function (eev) {
        console.log("Frye Consult: Route changed", eev && eev.detail && eev.detail.to && eev.detail.to.name);
        clearInterval(fryeConsultInterval);
        if (eev && eev.detail && eev.detail.to && eev.detail.to.params && eev.detail.to.params.location_id == FRYE_LOCATION_ID) {
            startScanning();
        }
    });

    if (window.location.href.indexOf(FRYE_LOCATION_ID) > -1) {
        console.log("Frye Consult: Already on Frye location, starting scan");
        startScanning();
    }

    function startScanning() {
        clearInterval(fryeConsultInterval);
        fryeConsultInterval = setInterval(function () { scanCards(); scanModal(); }, 500);
    }

    function scanCards() {
        var cards = document.querySelectorAll(".ui-card .ui-card-content [data-contact-id]");
        if (cards.length === 0) return;
        cards.forEach(function (element) {
            var parenDiv = element.parentElement;
            if (!parenDiv || parenDiv.classList.contains("frye_consult_added")) return;
            parenDiv.classList.add("frye_consult_added");
            console.log("Frye Consult: Adding icon to card");
            addConsultBtn(parenDiv);
        });
    }

    function addConsultBtn(parenDiv) {
        var btn = document.createElement("div");
        btn.classList.add("frye_consult_btn");
        btn.style.cssText = "position:relative;cursor:pointer;";
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#1D2567" viewBox="0 0 16 16"><path d="M9.293 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.707A1 1 0 0 0 13.707 4L10 .293A1 1 0 0 0 9.293 0zM9.5 3.5v-2l3 3h-2a1 1 0 0 1-1-1zM4.5 9a.5.5 0 0 1 0-1h7a.5.5 0 0 1 0 1h-7zM4 10.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5zm.5 2.5a.5.5 0 0 1 0-1h4a.5.5 0 0 1 0 1h-4z"/></svg>';
        if (parenDiv.children[2]) { parenDiv.children[2].appendChild(btn); } else { parenDiv.appendChild(btn); }
        btn.addEventListener("click", function (e) {
            e.stopPropagation(); e.preventDefault();
            var el = parenDiv.querySelector("[data-contact-id]");
            if (el) el.click();
            var attempts = 0;
            var wi = setInterval(function () {
                attempts++;
                var fi = document.querySelectorAll(".hr-form-item");
                if (fi.length > 3 || attempts > 40) {
                    clearInterval(wi);
                    if (fi.length < 3) { console.error("Frye Consult: Form fields did not load"); return; }
                    setTimeout(function () { doGeneratePDF(); }, 500);
                }
            }, 500);
        });
    }

    function scanModal() {
        if (document.querySelector(".frye-consult-pdf-btn")) return;
        var titleEl = document.querySelector(".ui-modal-heading .title");
        if (!titleEl) return;
        console.log("Frye Consult: Modal detected, adding button");
        var btn = document.createElement("button");
        btn.textContent = "Consultation PDF";
        btn.className = "frye-consult-pdf-btn";
        btn.style.cssText = "border:1px solid grey;background:#1D2567;color:white;border-radius:5px;padding:2px 10px;margin-left:8px;cursor:pointer;font-size:12px;vertical-align:middle;";
        btn.addEventListener("click", function (e) {
            e.stopPropagation(); e.preventDefault();
            btn.textContent = "Generating..."; btn.disabled = true;
            setTimeout(function () { doGeneratePDF(); btn.textContent = "Consultation PDF"; btn.disabled = false; }, 300);
        });
        titleEl.appendChild(btn);
    }

    function doGeneratePDF() {
        if (!pdfLibLoaded || !window.PDFLib) { alert("PDF library still loading. Please wait and try again."); return; }
        try {
            var data = scrapeFields();
            console.log("Frye Consult: Scraped data", data);
            showEditForm(data);
        } catch (err) { console.error("Frye Consult: PDF error:", err); }
    }

    function generateFromData(data) {
        fetchTemplate().then(function(templateBytes) { fillTemplate(data, templateBytes); })
        .catch(function(err) { console.error("Frye Consult: Template fetch error:", err); alert("Could not load PDF template. Check console."); });
    }

    function showEditForm(data) {
        var ex = document.querySelector(".frye-edit-form-container"); if (ex) ex.remove();

        var overlay = document.createElement("div");
        overlay.className = "frye-edit-form-container";
        overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;";

        var panel = document.createElement("div");
        panel.style.cssText = "background:white;border-radius:8px;width:90%;max-width:820px;height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3);";

        // Header
        var header = document.createElement("div");
        header.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #e5e7eb;flex-shrink:0;";
        var title = document.createElement("span");
        title.textContent = "Edit Consultation - " + (data.pncName || "New");
        title.style.cssText = "font-weight:600;font-size:15px;color:#1D2567;";
        var headerBtns = document.createElement("div");
        headerBtns.style.cssText = "display:flex;gap:8px;align-items:center;";
        var genBtn = document.createElement("button");
        genBtn.textContent = "Generate PDF";
        genBtn.style.cssText = "background:#1D2567;color:white;border:none;border-radius:5px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;";
        var closeBtn = document.createElement("button");
        closeBtn.textContent = "\u00D7";
        closeBtn.style.cssText = "background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280;padding:0 4px;";
        closeBtn.onclick = function() { overlay.remove(); };
        headerBtns.appendChild(genBtn);
        headerBtns.appendChild(closeBtn);
        header.appendChild(title);
        header.appendChild(headerBtns);

        // Scrollable form body
        var body = document.createElement("div");
        body.style.cssText = "flex:1;overflow-y:auto;padding:16px 20px;";

        var inputStyle = "width:100%;padding:6px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;box-sizing:border-box;font-family:inherit;";
        var labelStyle = "display:block;font-size:11px;font-weight:600;color:#374151;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.3px;";
        var fieldStyle = "margin-bottom:10px;";
        var rowStyle = "display:flex;gap:12px;";

        var fields = {};

        function makeInput(key, label, val, type) {
            var wrap = document.createElement("div");
            wrap.style.cssText = fieldStyle + "flex:1;min-width:0;";
            var lbl = document.createElement("label");
            lbl.textContent = label;
            lbl.style.cssText = labelStyle;
            var inp;
            if (type === "textarea") {
                inp = document.createElement("textarea");
                inp.rows = 3;
                inp.style.cssText = inputStyle + "resize:vertical;";
            } else if (type === "select") {
                inp = document.createElement("select");
                inp.style.cssText = inputStyle;
            } else {
                inp = document.createElement("input");
                inp.type = "text";
                inp.style.cssText = inputStyle;
            }
            inp.value = val || "";
            fields[key] = inp;
            wrap.appendChild(lbl);
            wrap.appendChild(inp);
            return wrap;
        }

        function makeSelect(key, label, options, val) {
            var wrap = makeInput(key, label, "", "select");
            var sel = fields[key];
            var optEmpty = document.createElement("option");
            optEmpty.value = ""; optEmpty.textContent = "-- Select --";
            sel.appendChild(optEmpty);
            for (var i = 0; i < options.length; i++) {
                var o = document.createElement("option");
                o.value = options[i]; o.textContent = options[i];
                if (val && val.toLowerCase().indexOf(options[i].toLowerCase()) > -1) o.selected = true;
                sel.appendChild(o);
            }
            return wrap;
        }

        function makeRow(items) {
            var row = document.createElement("div");
            row.style.cssText = rowStyle;
            for (var i = 0; i < items.length; i++) row.appendChild(items[i]);
            return row;
        }

        function makeSection(title) {
            var s = document.createElement("div");
            s.style.cssText = "font-size:13px;font-weight:700;color:#1D2567;border-bottom:2px solid #1D2567;padding-bottom:4px;margin:16px 0 10px 0;";
            if (body.children.length === 0) s.style.marginTop = "0";
            s.textContent = title;
            return s;
        }

        // === SECTION: Consultation Status ===
        body.appendChild(makeSection("Consultation Status"));
        body.appendChild(makeRow([
            makeSelect("consultStatus", "Consult Status", ["Completed","Cancelled","No Show"], data.consultStatus),
            makeSelect("consultType", "Consult Type", ["In Person","Zoom","Phone"], data.consultType),
            makeSelect("matterQualified", "Matter Qualified", ["Yes","No"], data.matterQualified)
        ]));
        body.appendChild(makeRow([
            makeInput("date", "Date", data.date),
            makeInput("time", "Time", data.time),
            makeInput("intaker", "Intaker", data.intaker),
            makeInput("scheduledBy", "Scheduled By", data.scheduledBy)
        ]));
        body.appendChild(makeRow([
            makeInput("reasonNotQualified", "Reason Not Qualified", data.reasonNotQualified),
            makeInput("staff", "Staff", data.staff)
        ]));

        // === SECTION: PNC Info ===
        body.appendChild(makeSection("PNC Information"));
        body.appendChild(makeRow([
            makeInput("pncName", "PNC Name", data.pncName),
            makeInput("dob", "Date of Birth", data.dob)
        ]));
        body.appendChild(makeRow([
            makeInput("phone", "Phone", data.phone),
            makeInput("email", "Email", data.email)
        ]));
        body.appendChild(makeInput("mailingAddress", "Mailing Address", data.mailingAddress));
        body.appendChild(makeRow([
            makeInput("militaryStatus", "Military Status", data.militaryStatus),
            makeInput("legalStatus", "Legal Status", data.legalStatus)
        ]));

        // === SECTION: Case Info ===
        body.appendChild(makeSection("Case Information"));
        body.appendChild(makeInput("charges", "Charges", data.charges));
        body.appendChild(makeRow([
            makeInput("doi", "Date of Incident", data.doi),
            makeInput("doa", "Date of Arrest", data.doa),
            makeInput("court", "Court", data.court),
            makeInput("county", "County", data.county)
        ]));
        body.appendChild(makeInput("incidentNotes", "Incident Notes", data.incidentNotes, "textarea"));
        body.appendChild(makeInput("involvedParties", "Involved Parties", data.involvedParties, "textarea"));
        body.appendChild(makeInput("priors", "Priors", data.priors, "textarea"));
        body.appendChild(makeInput("employer", "Employer/Employment", data.employer));
        body.appendChild(makeInput("employmentImpact", "Employment Impact", data.employmentImpact, "textarea"));
        body.appendChild(makeInput("medicalDiagnosis", "Medical Diagnosis/Meds", data.medicalDiagnosis, "textarea"));

        // === SECTION: Attorney Notes ===
        body.appendChild(makeSection("Attorney Notes & Outcomes"));
        body.appendChild(makeInput("attorneyNotes", "Attorney Notes", data.attorneyNotes, "textarea"));
        body.appendChild(makeRow([
            makeInput("desiredOutcome", "Desired Outcome", data.desiredOutcome, "textarea"),
            makeInput("biggestConcerns", "Biggest Concerns", data.biggestConcerns, "textarea")
        ]));
        body.appendChild(makeRow([
            makeInput("todoIfRetained", "To Do if Retained", data.todoIfRetained, "textarea"),
            makeInput("assignTo", "Assign To", data.assignTo, "textarea")
        ]));

        // === SECTION: Emergency Contact ===
        body.appendChild(makeSection("Emergency Contact"));
        body.appendChild(makeRow([
            makeInput("emergencyContact", "Emergency Contact", data.emergencyContact),
            makeInput("relationshipToPNC", "Relationship to PNC", data.relationshipToPNC)
        ]));
        body.appendChild(makeRow([
            makeInput("emergencyPhone", "Phone", data.emergencyPhone),
            makeInput("emergencyEmail", "Email", data.emergencyEmail)
        ]));

        // === SECTION: Payment ===
        body.appendChild(makeSection("Payment & Fees"));
        body.appendChild(makeRow([
            makeInput("retainerOnly", "Retainer Only", data.retainerOnly),
            makeInput("retainerPlusTrial", "Retainer + Trial", data.retainerPlusTrial)
        ]));
        body.appendChild(makeRow([
            makeSelect("singlePaymentRetainer", "Single Payment Retainer", ["Yes","No"], data.singlePaymentRetainer),
            makeSelect("paymentPlan", "Payment Plan", ["Yes","No"], data.paymentPlan)
        ]));
        body.appendChild(makeRow([
            makeInput("noRetainerReferTo", "No Retainer; Refer To", data.noRetainerReferTo),
            makeInput("other", "Other", data.other)
        ]));
        body.appendChild(makeRow([
            makeInput("dueAtSigning", "Due at Signing", data.dueAtSigning),
            makeInput("numInstallments", "# of Installments", data.numInstallments),
            makeSelect("dueDate", "Due Date", ["10","20"], data.dueDate)
        ]));
        body.appendChild(makeRow([
            makeInput("startDate", "Start Date", data.startDate),
            makeInput("cashDiscount", "Cash Discount", data.cashDiscount),
            makeInput("cashDiscountPaidBy", "Paid By", data.cashDiscountPaidBy)
        ]));

        // === SECTION: Discounts ===
        body.appendChild(makeSection("Courtesy & Calendar"));
        body.appendChild(makeRow([
            makeInput("courtesyDiscount", "Courtesy Discount", data.courtesyDiscount),
            makeInput("courtesyNotes", "Courtesy Discount Notes", data.courtesyNotes)
        ]));
        body.appendChild(makeRow([
            makeInput("calendarFeePaid", "Calendar Fee Paid", data.calendarFeePaid),
            makeInput("reasonWaived", "Reason Waived", data.reasonWaived)
        ]));

        // Generate button handler
        genBtn.addEventListener("click", function() {
            var formData = {};
            for (var key in fields) {
                if (fields.hasOwnProperty(key)) {
                    formData[key] = fields[key].value.trim();
                }
            }
            console.log("Frye Consult: Form data", formData);
            overlay.remove();
            generateFromData(formData);
        });

        panel.appendChild(header);
        panel.appendChild(body);
        overlay.appendChild(panel);
        overlay.addEventListener("click", function(e) { if (e.target === overlay) overlay.remove(); });
        document.body.appendChild(overlay);
    }

    function fillTemplate(data, templateBytes) {
        var PDFLib = window.PDFLib;
        PDFLib.PDFDocument.load(templateBytes).then(function(pdfDoc) {
            return Promise.all([pdfDoc, pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica), pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold)]);
        }).then(function(results) {
            var pdfDoc = results[0], font = results[1], fontBold = results[2];
            var pages = pdfDoc.getPages();
            var p1 = pages[0], p2 = pages[1], p3 = pages[2];
            var H = 792, sz = 9, szSm = 8, color = PDFLib.rgb(0, 0, 0);

            function txt(page, text, x, yTop, size, f) { if (!text) return; page.drawText(String(text), {x:x, y:H-yTop, size:size||sz, font:f||font, color:color}); }
            function chk(page, checked, x, yTop) { if (checked) txt(page, "X", x+1, yTop, 10, fontBold); }
            function m(v, t) { return v && v.toLowerCase().indexOf(t.toLowerCase()) > -1; }
            function wrap(text, f, s, mw) {
                if (!text) return [];
                var words = text.split(" "), lines = [], cur = "";
                for (var i = 0; i < words.length; i++) { var t = cur ? cur + " " + words[i] : words[i]; if (f.widthOfTextAtSize(t, s) > mw && cur) { lines.push(cur); cur = words[i]; } else { cur = t; } }
                if (cur) lines.push(cur); return lines;
            }

            // PAGE 1
            chk(p1, m(data.consultStatus,"Completed"), 67, 148); chk(p1, m(data.consultStatus,"Cancelled"), 67, 168); chk(p1, m(data.consultStatus,"No Show"), 67, 188);
            chk(p1, m(data.consultType,"In Person"), 193, 148); chk(p1, m(data.consultType,"Zoom"), 193, 168); chk(p1, m(data.consultType,"Phone"), 193, 188);
            chk(p1, m(data.matterQualified,"Yes"), 323, 148); chk(p1, m(data.matterQualified,"No"), 323, 168);
            txt(p1, data.date, 453, 128); txt(p1, data.time, 453, 148); txt(p1, data.intaker, 468, 168); txt(p1, data.scheduledBy, 480, 188);
            txt(p1, data.reasonNotQualified, 165, 210); txt(p1, data.staff, 460, 210);
            txt(p1, data.pncName, 120, 240); txt(p1, data.dob, 440, 240);
            txt(p1, data.phone, 95, 263); txt(p1, data.email, 340, 263);
            txt(p1, data.mailingAddress, 135, 283);
            txt(p1, data.militaryStatus, 140, 303); txt(p1, data.legalStatus, 393, 303);
            txt(p1, data.charges, 120, 323, szSm);
            txt(p1, data.doi, 82, 343); txt(p1, data.doa, 210, 343); txt(p1, data.court, 320, 343); txt(p1, data.county, 440, 343);
            var nl = wrap(data.incidentNotes, font, szSm, 480); for (var i=0;i<nl.length&&i<12;i++) txt(p1, nl[i], 72, 385+(i*12), szSm);
            nl = wrap(data.involvedParties, font, szSm, 480); for (var i=0;i<nl.length&&i<2;i++) txt(p1, nl[i], 72, 548+(i*12), szSm);
            nl = wrap(data.priors, font, szSm, 480); for (var i=0;i<nl.length&&i<2;i++) txt(p1, nl[i], 72, 598+(i*12), szSm);
            txt(p1, data.employer, 190, 640);
            nl = wrap(data.employmentImpact, font, szSm, 480); for (var i=0;i<nl.length&&i<2;i++) txt(p1, nl[i], 72, 678+(i*12), szSm);
            nl = wrap(data.medicalDiagnosis, font, szSm, 480); for (var i=0;i<nl.length&&i<2;i++) txt(p1, nl[i], 72, 740+(i*12), szSm);

            // PAGE 2
            nl = wrap(data.attorneyNotes, font, szSm, 480); for (var i=0;i<nl.length&&i<14;i++) txt(p2, nl[i], 72, 115+(i*13), szSm);
            nl = wrap(data.desiredOutcome, font, szSm, 220); for (var i=0;i<nl.length&&i<5;i++) txt(p2, nl[i], 72, 350+(i*12), szSm);
            nl = wrap(data.biggestConcerns, font, szSm, 220); for (var i=0;i<nl.length&&i<5;i++) txt(p2, nl[i], 330, 350+(i*12), szSm);
            nl = wrap(data.todoIfRetained, font, szSm, 220); for (var i=0;i<nl.length&&i<4;i++) txt(p2, nl[i], 72, 455+(i*12), szSm);
            nl = wrap(data.assignTo, font, szSm, 220); for (var i=0;i<nl.length&&i<4;i++) txt(p2, nl[i], 330, 455+(i*12), szSm);
            txt(p2, data.emergencyContact, 175, 530); txt(p2, data.relationshipToPNC, 430, 530);
            txt(p2, data.emergencyPhone, 105, 550); txt(p2, data.emergencyEmail, 295, 550);
            txt(p2, data.retainerOnly, 175, 590); txt(p2, data.retainerPlusTrial, 380, 590);
            chk(p2, m(data.singlePaymentRetainer,"Yes")||m(data.singlePaymentRetainer,"Single"), 67, 615);
            chk(p2, m(data.paymentPlan,"Yes")||m(data.paymentPlan,"Payment"), 67, 638);
            txt(p2, data.noRetainerReferTo, 410, 615); txt(p2, data.other, 255, 638);
            txt(p2, data.dueAtSigning, 140, 660); txt(p2, data.numInstallments, 320, 660);
            chk(p2, m(data.dueDate,"10"), 430, 660); chk(p2, m(data.dueDate,"20"), 490, 660);
            txt(p2, data.startDate, 120, 682); txt(p2, data.cashDiscount, 310, 682); txt(p2, data.cashDiscountPaidBy, 450, 682);

            // PAGE 3
            txt(p3, data.courtesyDiscount, 175, 115); txt(p3, data.courtesyNotes, 320, 115);
            txt(p3, data.calendarFeePaid, 155, 137); txt(p3, data.reasonWaived, 375, 137);

            return pdfDoc.save();
        }).then(function(filledBytes) {
            var blob = new Blob([filledBytes], {type:"application/pdf"});
            showPreview(blob, data);
        }).catch(function(err) { console.error("Frye Consult: Fill error:", err); });
    }

    function showPreview(blob, data) {
        var ex = document.querySelector(".frye-pdf-popup-container"); if (ex) ex.remove();
        var url = URL.createObjectURL(blob);
        var c = document.createElement("div"); c.className = "frye-pdf-popup-container";
        c.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:99999;display:flex;align-items:center;justify-content:center;";
        var p = document.createElement("div"); p.style.cssText = "background:white;border-radius:8px;width:80%;max-width:900px;height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3);";
        var h = document.createElement("div"); h.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #e5e7eb;";
        var t = document.createElement("span"); t.textContent = "Consultation - " + (data.pncName || "Preview"); t.style.cssText = "font-weight:600;font-size:14px;";
        var bg = document.createElement("div"); bg.style.cssText = "display:flex;gap:8px;";
        var db = document.createElement("button"); db.textContent = "Download PDF"; db.style.cssText = "background:#1D2567;color:white;border:none;border-radius:5px;padding:6px 14px;cursor:pointer;font-size:13px;";
        db.onclick = function() { var a = document.createElement("a"); a.href = url; a.download = "Consultation_" + (data.pncName||"Form").replace(/\s+/g,"_") + ".pdf"; a.click(); };
        var cb = document.createElement("button"); cb.textContent = "\u00D7"; cb.style.cssText = "background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280;padding:0 4px;";
        cb.onclick = function() { URL.revokeObjectURL(url); c.remove(); };
        bg.appendChild(db); bg.appendChild(cb); h.appendChild(t); h.appendChild(bg);
